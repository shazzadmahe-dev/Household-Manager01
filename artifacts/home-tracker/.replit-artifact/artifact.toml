kind = "web"
previewPath = "/"
title = "82 Walthen Drive"
version = "1.0.0"
id = "artifacts/home-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20811

[services.development]
run = "pnpm --filter @workspace/home-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/home-tracker", "run", "build" ]
publicDir = "artifacts/home-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20811"
BASE_PATH = "/"
